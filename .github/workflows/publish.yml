name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q
      - name: Run critical lint
        run: python -m ruff check src tests --select E9,F63,F7,F82
      - name: Audit Python dependencies
        run: python -m pip_audit --skip-editable --progress-spinner off
      - name: Release readiness check
        run: crupier release check --strict-public
      - name: Build distributions
        run: python -m build --sdist --wheel --outdir dist
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Upload distributions artifact
        uses: actions/upload-artifact@v6
        with:
          name: crupier-distributions
          path: dist/*
          if-no-files-found: error
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
